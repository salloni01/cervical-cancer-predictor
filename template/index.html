<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>

        html, body {

        height: 100%;
         margin: 0;
        }

        body {
            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            background-color: #f5f9ff;

            font-family: Arial, sans-serif;
        }

        h1 {

            color: #0b0b0b;

            margin-bottom: 30px;

            text-align: center;

            font-size: 72px;
        }
        p{

            font-size:20px;

            color:#555;

            line-height:1.7;

            margin-bottom:35px;
        }
        .main-box {

            background: white;

            padding: 50px;

            border-radius: 20px;

            text-align: center;

            box-shadow: 0 0 20px rgba(0,0,0,0.1);

            border: 2px solid #edc2e5;
        }

        .custom-signin-btn {

            background-color: #e5506b;

            color: white;

            padding: 12px 24px;

            border-radius: 10px;

            text-decoration: none;

            margin: 10px;

            display: inline-block;

            width: 140px;

            font-size: 18px;

            transition: 0.3s;
        }

        .custom-signin-btn:hover {

            background-color: #d63f5c;
        }

        .custom-signup-btn {

            background-color: #6c63ff;

            color: white;

            padding: 12px 24px;

            border-radius: 10px;

            text-decoration: none;

            margin: 10px;

            display: inline-block;

            width: 140px;

            font-size: 18px;

            transition: 0.3s;
        }

        .custom-signup-btn:hover {

            background-color: #574bdb;
        }

    </style>

</head>

<body>

    <h1>Cervical Cancer Prediction System</h1>
     <p>
        Early detection saves lives.
        This intelligent system helps predict cervical cancer risk
        using medical history analysis and medical image assessment.
    </p>
    <div class="main-box">

        <a href="/signup" class="custom-signup-btn">
            Signup
        </a>

        <a href="/signin" class="custom-signin-btn">
            Signin
        </a>

    </div>

</body>
</html>
